<body>
    <div class="login">
        <h1>Login</h1>

        <!---Login Fields--->
        <div class="input">
            <label for="email">Email</label>
            <input type="text" id="email" placeholder="Enter email here...">
        </div>
        
        <div class="input">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password here...">
        </div>
        <!---Login Fields--->

        <button type="button" id="loginButton">Log In</button> <!--Button-->
        
        <h3 id="message"></h3> <!--Error/Success Display-->
    </div>

    <script src="login.js"></script> <!--JavaScript Functionality-->
    
</body>
